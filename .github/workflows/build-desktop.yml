name: Build desktop installers

on:
  push:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - 'apps/web/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch: # allow manual trigger from GitHub UI

# Build the .dmg (macOS) and .exe (Windows) installers in parallel.
# Mac runs on macos-latest (Apple Silicon by default — produces both arm64
# and x64 dmg via electron-builder's --arch x64,arm64 config).
# Windows runs on windows-latest.
jobs:
  mac:
    name: Build macOS .dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root deps
        run: npm install --no-audit --no-fund
      - name: Build web app
        working-directory: apps/web
        run: npm run build
      - name: Build desktop TS
        working-directory: apps/desktop
        run: npm run build
      - name: Package macOS .dmg
        working-directory: apps/desktop
        # No code signing — release/.dmg can still be opened via right-click → Open
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run package:mac
      - name: Upload .dmg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ace-dialer-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
          if-no-files-found: error
          retention-days: 30

  windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root deps
        run: npm install --no-audit --no-fund
      - name: Build web app
        working-directory: apps/web
        run: npm run build
      - name: Build desktop TS
        working-directory: apps/desktop
        run: npm run build
      - name: Package Windows .exe
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run package:win
      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ace-dialer-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
          if-no-files-found: error
          retention-days: 30
